# Docker Compose for KG RAG v2.0-beta
# Self-contained PostgreSQL with pgvector for local development

version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: kg_rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kg_rag
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Persist data
      - postgres_data:/var/lib/postgresql/data
      # Initialize schema on first run
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kg_rag"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kg_rag_network

  # Optional: PgBouncer for connection pooling
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: kg_rag_pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DATABASE: kg_rag
      DATABASES_USER: postgres
      DATABASES_PASSWORD: postgres
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kg_rag_network

volumes:
  postgres_data:
    name: kg_rag_postgres_data

networks:
  kg_rag_network:
    name: kg_rag_network
